<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Hub — Home</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="index-mobile.css">
</head>
<body>
  <div class="wave-shimmer"></div>
 
  <!-- MOBILE LAYOUT -->
  <div class="mobile-layout">
    <!-- LEFT PANEL (25%) -->
    <aside class="mobile-left">
      <button class="menu-toggle-btn" id="menuToggleBtn">☰ Menu</button>
      
      <!-- Day Columns (1-5) -->
      <div class="day-columns">
        <button class="day-col" onclick="selectDay(1)">Day<br>1</button>
        <button class="day-col" onclick="selectDay(2)">Day<br>2</button>
        <button class="day-col" onclick="selectDay(3)">Day<br>3</button>
        <button class="day-col" onclick="selectDay(4)">Day<br>4</button>
        <button class="day-col" onclick="selectDay(5)">Day<br>5</button>
      </div>
 
      <!-- Studique Tag -->
      <a href="https://studique.in/" target="_blank" class="studique-tag">
        📚 SRM Studique
      </a>
    </aside>
 
    <!-- CENTER PANEL (75%) -->
    <main class="mobile-center">
      <div class="content-box">
        <span class="box-label">Day Order - Subject Details</span>
        <div id="dayOrderContent" class="day-order-content">
          <p class="hint-text">Select a day column</p>
        </div>
      </div>
    </main>
  </div>
 
  <!-- TASKBAR -->
  <div class="taskbar">
    <button class="nav-btn active" onclick="location.href='index.html'">🏠 Home</button>
    <button class="nav-btn" onclick="location.href='folder.html'">📁 Folder</button>
    <button class="nav-btn" onclick="location.href='studyplan.html'">📋 Study Plan</button>
  </div>
 
  <!-- MENU MODAL -->
  <div class="modal" id="menuModal">
    <div class="modal-overlay" id="menuOverlay"></div>
    <div class="modal-box">
      <div class="modal-title">Create/Edit Day Order</div>
      <button class="modal-close" id="closeMenuModal">✕</button>
      
      <select class="input-field" id="menuDaySelect">
        <option value="1">Day 1</option>
        <option value="2">Day 2</option>
        <option value="3">Day 3</option>
        <option value="4">Day 4</option>
        <option value="5">Day 5</option>
      </select>
 
      <select class="input-field" id="menuSubjectSelect">
        <option value="">-- Select Subject --</option>
      </select>
 
      <input type="time" class="input-field" id="menuStartTime" placeholder="Start time">
      <input type="time" class="input-field" id="menuEndTime" placeholder="End time">
 
      <button class="btn btn-yellow btn-full" id="menuCreateBtn">+ Create</button>
 
      <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(0,255,65,.2);">
        <button class="btn btn-ghost btn-full" id="viewSubjectBtn">👁️ View Subject</button>
      </div>
 
      <div class="modal-row" style="margin-top: 12px;">
        <button class="btn btn-ghost btn-full" id="closeMenuBtn">Close</button>
      </div>
    </div>
  </div>
 
  <!-- DESKTOP LAYOUT (Keep original for PC) -->
  <div class="desktop-layout">
    <div class="layout">
      <!-- LEFT SIDEBAR (30%) -->
      <aside class="panel panel-left">
        <div class="content-box">
          <span class="box-label">Add Subject</span>
          <input class="input-field" id="subjectInput" placeholder="Subject name…">
          <input class="input-field" id="descInput" placeholder="Description…">
          <div class="row-2">
            <button class="btn btn-yellow" id="createSubjectBtn">Create</button>
            <button class="btn btn-ghost" id="resetBtn">Reset</button>
          </div>
        </div>
 
        <div class="content-box">
          <button class="btn btn-yellow btn-full btn-icon-label" id="goStudyPlanBtn">
            <span>📚</span> Create Study Plan
          </button>
        </div>
 
        <div class="content-box search-results-box">
          <span class="box-label">Search Results</span>
          <div class="search-results" id="searchResults">
            <p class="hint-text">type something to search…</p>
          </div>
        </div>
 
        <div class="content-box">
          <div class="search-row">
            <input class="input-field" id="searchInput" placeholder="Search…">
            <button class="btn btn-yellow search-icon-btn" id="searchBtn">🔍</button>
          </div>
        </div>
      </aside>
 
      <!-- CENTER (40%) -->
      <main class="panel panel-center">
        <div class="content-box subject-display-box">
          <span class="box-label">Subjects</span>
          <div class="subjects-list" id="subjectsList">
            <p class="hint-text">ex: for added subject can view stay!</p>
          </div>
        </div>
 
        <div class="content-box dayorder-display-box">
          <span class="box-label">Day-Order Schedule</span>
          <div class="dayorder-tabs" id="dayorderTabs">
            <button class="day-tab active-tab" data-day="1">Day 1</button>
            <button class="day-tab" data-day="2">Day 2</button>
            <button class="day-tab" data-day="3">Day 3</button>
            <button class="day-tab" data-day="4">Day 4</button>
            <button class="day-tab" data-day="5">Day 5</button>
          </div>
          <div class="dayorder-list" id="dayorderList">
            <p class="hint-text">No entries for this day.</p>
          </div>
        </div>
      </main>
 
      <!-- RIGHT SIDEBAR (30%) -->
      <aside class="panel panel-right">
        <div class="content-box clock-box">
          <div class="clock-rect" id="clockRect">
            <span class="clock-time" id="clockTime">00:00</span>
          </div>
        </div>
 
        <div class="content-box">
          <span class="box-label">Create Day-Order</span>
          <select class="input-field" id="daySelect">
            <option value="1">Day 1</option>
            <option value="2">Day 2</option>
            <option value="3">Day 3</option>
            <option value="4">Day 4</option>
            <option value="5">Day 5</option>
          </select>
          <input class="input-field" id="daySubjectInput" placeholder="Subject…">
          <div class="time-row">
            <input type="time" class="input-field" id="startTime">
            <span class="arrow-sep">→</span>
            <input type="time" class="input-field" id="endTime">
          </div>
          <button class="btn btn-yellow btn-full" id="createDayOrderBtn">Create</button>
        </div>
 
        <div class="content-box">
          <span class="box-label">Create Folder</span>
          <input class="input-field" id="folderNameInput" placeholder="Folder name…">
          <div id="pendingFilesList" class="pending-files"></div>
          <div class="row-2">
            <button class="btn btn-ghost" id="addPendingFileBtn">+ Add File</button>
            <button class="btn btn-yellow" id="createFolderBtn">Create</button>
          </div>
        </div>
      </aside>
    </div>
  </div>
 
  <!-- Notification -->
  <div class="notification" id="notification"><span id="notifText"></span></div>
 
  <script src="Index.js"></script>
  <script src="index-mobile.js"></script>
</body>
</html>
